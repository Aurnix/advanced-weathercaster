name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      # data-dependent tests (integer artifacts) skip automatically when the
      # trained artifacts are absent; everything else runs on fixtures
      - run: pytest -q
